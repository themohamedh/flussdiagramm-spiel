name: Restore diagram scrollbar once

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore-scrollbar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore full-size scrollable board
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          replacement = """    .board-wrap {
              overflow: auto;
              overscroll-behavior: contain;
              -webkit-overflow-scrolling: touch;
              scrollbar-gutter: stable both-edges;
            }

            .board-viewport {
              position: relative;
              width: 1240px;
              height: 1320px;
              margin: 0 auto;
              overflow: visible;
              border-radius: 34px;
            }
          """
          replacement = re.sub(r"^ {10}", "", replacement, flags=re.M)
          text, count = re.subn(r"    \.board-wrap \{.*?^    \}\n\n    \.board-viewport \{.*?^    \}\n", replacement, text, count=1, flags=re.M | re.S)
          if count != 1:
              raise SystemExit("Board CSS block was not found exactly once")
          text = text.replace('    const boardViewportEl = document.getElementById("boardViewport");\n', '')
          text = text.replace('    const BOARD_WIDTH = 1240;\n    const BOARD_HEIGHT = 1320;\n', '')
          text = re.sub(r"\n    function resizeBoardToViewport\(\) \{.*?\n    \}\n\n    function playTone", "\n    function playTone", text, count=1, flags=re.S)
          text = text.replace('    window.addEventListener("resize", resizeBoardToViewport);\n\n', '')
          text = text.replace('    resizeBoardToViewport();\n', '')
          if "resizeBoardToViewport" in text:
              raise SystemExit("Scaling code remains")
          path.write_text(text, encoding="utf-8")
          PY
      - name: Commit restored scrollbar
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Restore horizontal scrolling for flow diagram"
          git push
