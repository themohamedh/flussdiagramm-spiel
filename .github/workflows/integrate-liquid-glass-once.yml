name: Integrate Liquid Glass once

"on":
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link Liquid Glass stylesheet
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          link = '  <link rel="stylesheet" href="./liquid-glass.css" />\n'
          if 'liquid-glass.css' not in s:
              s = s.replace('</head>', link + '</head>', 1)
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/integrate-liquid-glass-once.yml
          git add index.html
          git commit -m "Apply Liquid Glass design"
          git push
