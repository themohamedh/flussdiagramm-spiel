name: Integrate PWA once

"on":
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add PWA metadata and registration
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          head = '''  <meta name="theme-color" content="#1e3a8a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Flussdiagramm" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./app-icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./app-icon.svg" />
'''
          registration = '''
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
'''
          if 'rel="manifest"' not in text:
              text = text.replace("  <title>Flussdiagramm-Spiel: Tarifrunde & Streik</title>\n", "  <title>Flussdiagramm-Spiel: Tarifrunde & Streik</title>\n" + head, 1)
          if 'navigator.serviceWorker.register' not in text:
              text = text.replace("</body>", registration + "</body>", 1)
          path.write_text(text, encoding="utf-8")
          PY
      - name: Commit PWA integration and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/add-pwa-once.yml
          git add index.html
          git commit -m "Make flow diagram installable as a PWA"
          git push
