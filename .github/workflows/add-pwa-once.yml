name: Integrate PWA once

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate-pwa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add PWA links
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          links = '  <meta name="theme-color" content="#1e3a8a" />\n  <meta name="apple-mobile-web-app-capable" content="yes" />\n  <meta name="apple-mobile-web-app-status-bar-style" content="default" />\n  <meta name="apple-mobile-web-app-title" content="Flussdiagramm" />\n  <link rel="manifest" href="./manifest.webmanifest" />\n  <link rel="icon" href="./app-icon.svg" type="image/svg+xml" />\n  <link rel="apple-touch-icon" href="./app-icon.svg" />\n'
          register = '\n  <script>\n    if ("serviceWorker" in navigator) {\n      window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js").catch(() => {}));\n    }\n  </script>\n'
          if 'rel="manifest"' not in s:
              s = s.replace('</head>', links + '</head>', 1)
          if 'navigator.serviceWorker.register' not in s:
              s = s.replace('</body>', register + '</body>', 1)
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/add-pwa-once.yml
          git add index.html
          git commit -m "Make flow diagram installable as a PWA"
          git push
