<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarifkonflikt Whiteboard Lernspiel</title>
  <style>
    :root {
      --board: #f9fcff;
      --ink: #213047;
      --line: #5f6f86;
      --muted: #6f7d90;
      --ok-bg: #e7f7eb;
      --ok-bd: #2e9b56;
      --bad-bg: #fdeceb;
      --bad-bd: #cc3d35;
      --slot-bd: #8ea4bf;
      --card: #ffffff;
      --accent: #2c72e7;
      --shadow: 0 10px 24px rgba(24, 43, 68, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 18px;
      background: linear-gradient(180deg, #f3f7ff, #eef4fb);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .panel {
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow);
      border: 1px solid #d9e3f0;
      padding: 14px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.2rem, 2vw, 1.7rem);
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .board-wrap {
      overflow: auto;
      padding-bottom: 6px;
    }

    .board {
      position: relative;
      width: 1120px;
      height: 820px;
      margin: 0 auto;
      border: 2px solid #cfdbea;
      border-radius: 12px;
      background:
        repeating-linear-gradient(0deg, transparent 0 39px, rgba(133, 154, 182, 0.08) 39px 40px),
        repeating-linear-gradient(90deg, transparent 0 39px, rgba(133, 154, 182, 0.08) 39px 40px),
        var(--board);
    }

    .branch-sign {
      position: absolute;
      font-weight: 800;
      font-size: 2rem;
      color: #6b7d95;
      z-index: 2;
      user-select: none;
    }

    .minus { left: 300px; top: 130px; }
    .plus { left: 792px; top: 130px; }

    .node {
      position: absolute;
      z-index: 3;
      border: 2px dashed var(--slot-bd);
      border-radius: 11px;
      background: #fff;
      width: 230px;
      min-height: 68px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
      line-height: 1.2;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .node.cloud {
      border-radius: 50px;
      min-height: 84px;
      clip-path: polygon(7% 58%, 11% 39%, 22% 30%, 29% 17%, 42% 11%, 56% 15%, 66% 8%, 78% 13%, 86% 24%, 95% 36%, 95% 56%, 88% 72%, 78% 81%, 63% 87%, 47% 90%, 33% 87%, 21% 80%, 11% 70%);
      padding: 16px;
      border-style: solid;
      border-color: #a8bfd8;
      background: linear-gradient(180deg, #ffffff, #f2f8ff);
    }

    .node.empty::before {
      content: "Begriff hier einsetzen";
      color: #7f8ea3;
      font-weight: 500;
      font-size: 0.86rem;
    }

    .node.drag-over {
      border-color: var(--accent);
      background: #eef5ff;
      transform: scale(1.01);
    }

    .node.correct {
      border-style: solid;
      border-color: var(--ok-bd);
      background: var(--ok-bg);
      color: #1f6c3c;
    }

    .node.wrong {
      border-style: solid;
      border-color: var(--bad-bd);
      background: var(--bad-bg);
      color: #8b2d27;
    }

    svg.lines {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .lines path, .lines line {
      stroke: var(--line);
      stroke-width: 3;
      fill: none;
      marker-end: url(#arrow);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .check { background: #2c72e7; color: #fff; }
    .reset { background: #dbe5f3; color: #223046; }
    .solve { background: #f6e2a8; color: #5a4618; }

    .progress {
      margin-left: auto;
      background: #eef4ff;
      border: 1px solid #d0def6;
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: 700;
    }

    .status {
      min-height: 22px;
      color: #3c526f;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }

    .card {
      border: 2px solid #cdddf3;
      border-radius: 10px;
      background: linear-gradient(180deg, #fff, #f8fbff);
      min-height: 58px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
      cursor: grab;
      user-select: none;
    }

    .card.selected { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(44, 114, 231, 0.2); }
    .card.used { opacity: 0.45; filter: grayscale(1); cursor: not-allowed; text-decoration: line-through; }

    @media (max-width: 900px) {
      body { padding: 10px; }
      .panel { padding: 12px; }
      .progress { width: 100%; margin-left: 0; text-align: center; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>Whiteboard-Lernspiel: Ablauf von Tarifverhandlungen</h1>
      <p class="sub">Ziehe die Begriffskarten in die passenden Felder oder nutze Klick-Auswahl + Klick auf ein Feld.</p>
    </section>

    <section class="panel board-wrap">
      <div class="board" id="board">
        <!-- Verbindungs-Linien für den Tafelbild-Aufbau -->
        <svg class="lines" viewBox="0 0 1120 820" aria-hidden="true">
          <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L9,3 z" fill="#5f6f86"></path>
            </marker>
          </defs>

          <!-- Start zu linker und rechter Verzweigung -->
          <line x1="560" y1="102" x2="300" y2="178"></line>
          <line x1="560" y1="102" x2="820" y2="178"></line>

          <!-- Konfliktweg links nach unten -->
          <line x1="300" y1="238" x2="300" y2="316"></line>
          <line x1="300" y1="376" x2="300" y2="454"></line>
          <line x1="300" y1="514" x2="300" y2="592"></line>

          <!-- Von linker Urabstimmung nach Streik und weiter zu Aussperrung -->
          <line x1="420" y1="626" x2="560" y2="626"></line>
          <line x1="680" y1="626" x2="878" y2="626"></line>

          <!-- Einigungsweg rechts -->
          <line x1="820" y1="246" x2="820" y2="324"></line>
          <line x1="820" y1="384" x2="820" y2="462"></line>
        </svg>

        <div class="branch-sign minus">−</div>
        <div class="branch-sign plus">+</div>

        <!-- Knoten: bewusst manuell positioniert -->
        <div class="node empty" data-key="start" style="left:445px; top:30px;"></div>

        <div class="node empty" data-key="scheitern" style="left:185px; top:178px;"></div>
        <div class="node empty" data-key="schlichtung" style="left:185px; top:316px;"></div>
        <div class="node empty" data-key="friedenspflicht" style="left:185px; top:454px;"></div>
        <div class="node empty" data-key="urabstimmung_links" style="left:185px; top:592px;"></div>

        <div class="node empty" data-key="streik" style="left:450px; top:592px;"></div>
        <div class="node empty" data-key="aussperrung" style="left:878px; top:592px;"></div>

        <div class="node empty cloud" data-key="tarifvertrag" style="left:705px; top:178px;"></div>
        <div class="node empty" data-key="urabstimmung_rechts" style="left:705px; top:316px;"></div>
        <div class="node empty" data-key="neue_verhandlung" style="left:705px; top:454px;"></div>
      </div>
    </section>

    <section class="panel">
      <div class="controls">
        <button id="checkBtn" class="check">Prüfen</button>
        <button id="resetBtn" class="reset">Zurücksetzen</button>
        <button id="solveBtn" class="solve">Lösung anzeigen</button>
        <div class="progress" id="progress">0 / 10 richtig</div>
      </div>
      <div class="status" id="status">Wähle eine Karte oder ziehe sie in ein leeres Feld.</div>
      <div class="cards" id="cards"></div>
    </section>
  </main>

  <script>
    // Erwartete Lösung für jedes Feld
    const SOLUTIONS = {
      start: "Tarifverhandlungen beginnen",
      scheitern: "Scheitern",
      schlichtung: "Schlichtung",
      friedenspflicht: "Ende der Friedenspflicht",
      urabstimmung_links: "Urabstimmung",
      streik: "Streik",
      aussperrung: "Aussperrung",
      tarifvertrag: "Tarifvertrag",
      urabstimmung_rechts: "Urabstimmung",
      neue_verhandlung: "Neue Verhandlung"
    };

    // Sichtbare Wortkarten unten
    const WORD_CARDS = [
      "Tarifverhandlungen beginnen",
      "Scheitern",
      "Schlichtung",
      "Ende der Friedenspflicht",
      "Urabstimmung",
      "Urabstimmung",
      "Streik",
      "Aussperrung",
      "Tarifvertrag",
      "Neue Verhandlung"
    ];

    const slots = [...document.querySelectorAll('.node')];
    const cardsBox = document.getElementById('cards');
    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress');

    let selectedCardId = null;
    let placed = {}; // key -> cardId

    function createCardId(word, index) {
      return `${word}__${index}`;
    }

    const cardData = WORD_CARDS.map((word, index) => ({ id: createCardId(word, index), word }));

    function isCardUsed(cardId) {
      return Object.values(placed).includes(cardId);
    }

    function renderCards() {
      cardsBox.innerHTML = '';

      cardData.forEach(card => {
        const used = isCardUsed(card.id);
        const div = document.createElement('div');
        div.className = `card${used ? ' used' : ''}${selectedCardId === card.id ? ' selected' : ''}`;
        div.textContent = card.word;
        div.draggable = !used;
        div.dataset.cardId = card.id;

        div.addEventListener('click', () => {
          if (used) return;
          selectedCardId = card.id;
          renderCards();
          statusEl.textContent = `Ausgewählt: „${card.word}“. Jetzt Feld anklicken.`;
        });

        div.addEventListener('dragstart', event => {
          if (used) {
            event.preventDefault();
            return;
          }
          selectedCardId = card.id;
          event.dataTransfer.setData('text/plain', card.id);
          event.dataTransfer.effectAllowed = 'move';
        });

        cardsBox.appendChild(div);
      });
    }

    function setSlotText(slot, text) {
      if (!text) {
        slot.textContent = '';
        slot.classList.add('empty');
      } else {
        slot.textContent = text;
        slot.classList.remove('empty');
      }
    }

    function placeCardIntoSlot(slot, cardId) {
      if (!cardId) return;

      const key = slot.dataset.key;
      const card = cardData.find(c => c.id === cardId);
      if (!card) return;

      // Karte eventuell aus altem Feld entfernen
      const existingKey = Object.keys(placed).find(k => placed[k] === cardId);
      if (existingKey) {
        const old = slots.find(s => s.dataset.key === existingKey);
        delete placed[existingKey];
        old.classList.remove('correct', 'wrong');
        setSlotText(old, '');
      }

      // Bestehende Karte im Zielfeld freigeben
      if (placed[key]) {
        delete placed[key];
      }

      placed[key] = cardId;
      slot.classList.remove('correct', 'wrong');
      setSlotText(slot, card.word);

      // Sofort-Feedback
      if (card.word === SOLUTIONS[key]) {
        slot.classList.add('correct');
        statusEl.textContent = `Richtig: „${card.word}“.`;
      } else {
        slot.classList.add('wrong');
        statusEl.textContent = `Noch nicht richtig: „${card.word}“ passt hier nicht.`;
      }

      selectedCardId = null;
      renderCards();
      updateProgress();
    }

    function updateProgress() {
      let correct = 0;
      slots.forEach(slot => {
        const key = slot.dataset.key;
        const cardId = placed[key];
        if (!cardId) return;
        const card = cardData.find(c => c.id === cardId);
        if (card && card.word === SOLUTIONS[key]) correct += 1;
      });
      progressEl.textContent = `${correct} / ${slots.length} richtig`;
    }

    slots.forEach(slot => {
      slot.addEventListener('dragover', event => {
        event.preventDefault();
        slot.classList.add('drag-over');
      });

      slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));

      slot.addEventListener('drop', event => {
        event.preventDefault();
        slot.classList.remove('drag-over');
        const droppedCardId = event.dataTransfer.getData('text/plain');
        placeCardIntoSlot(slot, droppedCardId);
      });

      slot.addEventListener('click', () => {
        if (!selectedCardId) {
          statusEl.textContent = 'Bitte zuerst eine Karte auswählen.';
          return;
        }
        placeCardIntoSlot(slot, selectedCardId);
      });
    });

    document.getElementById('checkBtn').addEventListener('click', () => {
      let correct = 0;
      slots.forEach(slot => {
        const key = slot.dataset.key;
        const cardId = placed[key];
        slot.classList.remove('correct', 'wrong');

        if (!cardId) {
          setSlotText(slot, '');
          return;
        }

        const card = cardData.find(c => c.id === cardId);
        if (card.word === SOLUTIONS[key]) {
          slot.classList.add('correct');
          correct += 1;
        } else {
          slot.classList.add('wrong');
        }
      });
      progressEl.textContent = `${correct} / ${slots.length} richtig`;
      statusEl.textContent = `Prüfung abgeschlossen: ${correct} Felder korrekt.`;
      renderCards();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      placed = {};
      selectedCardId = null;
      slots.forEach(slot => {
        slot.classList.remove('correct', 'wrong', 'drag-over');
        setSlotText(slot, '');
      });
      statusEl.textContent = 'Zurückgesetzt. Starte neu!';
      renderCards();
      updateProgress();
    });

    document.getElementById('solveBtn').addEventListener('click', () => {
      placed = {};
      slots.forEach(slot => {
        const key = slot.dataset.key;
        const neededWord = SOLUTIONS[key];
        const freeCard = cardData.find(c => c.word === neededWord && !Object.values(placed).includes(c.id));
        if (freeCard) {
          placed[key] = freeCard.id;
          setSlotText(slot, freeCard.word);
          slot.classList.remove('wrong');
          slot.classList.add('correct');
        }
      });
      selectedCardId = null;
      statusEl.textContent = 'Lösung wird angezeigt.';
      renderCards();
      updateProgress();
    });

    // Initialzustand
    slots.forEach(slot => setSlotText(slot, ''));
    renderCards();
    updateProgress();
  </script>
</body>
</html>
